<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVE-X | WhatsApp Bot — Online</title>

    <meta name="description" content="DAVE-X WhatsApp Bot by Dave Tech — Active and Running">
    <meta property="og:title" content="DAVE-X | by Dave Tech">
    <meta property="og:description" content="DAVE-X is Active and Running">
    <meta property="og:image" content="https://i.ibb.co/0jZ3Z3Z/davex.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%237c3aed'/><text y='.9em' x='50%' text-anchor='middle' font-size='44' font-weight='bold' fill='white' font-family='Arial'>DX</text></svg>">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #7c3aed;
            --accent:  #06b6d4;
            --green:   #10b981;
            --dark:    #09090b;
            --card:    rgba(18, 18, 24, 0.85);
            --border:  rgba(124, 58, 237, 0.35);
            --text:    #e4e4e7;
            --muted:   #71717a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }

        body {
            min-height: 100vh;
            background: var(--dark);
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(124, 58, 237, 0.18) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 85%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 44px;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 6px;
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: 3px solid rgba(124, 58, 237, 0.7);
            box-shadow: 0 0 24px rgba(124, 58, 237, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .bot-name {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(120deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .bot-tag {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── STATUS CARD ── */
        .status-card {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 44px 32px 36px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 28px;
        }

        .status-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
        }

        .status-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .status-icon {
            font-size: 3.6rem;
            color: var(--green);
            filter: drop-shadow(0 0 12px rgba(16, 185, 129, 0.6));
            animation: pulse 2.2s ease-in-out infinite;
            margin-bottom: 18px;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.06); }
        }

        .status-text {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--green), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .status-sub {
            color: var(--muted);
            font-size: 1.05rem;
            margin-bottom: 32px;
        }

        /* ── INFO BOXES ── */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 4px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 18px 14px;
            transition: background 0.25s;
        }

        .info-box:hover { background: rgba(255, 255, 255, 0.07); }

        .info-label {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .info-val {
            font-size: 1.6rem;
            font-weight: 700;
        }

        #timeValue { color: var(--accent); }
        #dateValue { color: #f59e0b; }
        #dayValue  { color: var(--primary); }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 760px;
            margin-bottom: 28px;
        }

        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .stat-lbl {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ── DEVELOPER ── */
        .dev-section {
            text-align: center;
            padding: 28px 20px 0;
            width: 100%;
            max-width: 760px;
            border-top: 1px solid rgba(255,255,255,0.07);
            margin-bottom: 28px;
        }

        .dev-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }

        .dev-name {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(120deg, var(--primary), #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            width: 100%;
            max-width: 760px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-top: 14px;
        }

        .social-row a {
            color: var(--muted);
            font-size: 1.4rem;
            transition: color 0.25s, transform 0.25s;
            text-decoration: none;
        }

        .social-row a:hover { color: var(--accent); transform: scale(1.2); }

        /* ── PARTICLES ── */
        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: -1;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .bot-name { font-size: 2.2rem; }
            .status-text { font-size: 1.6rem; }
            .info-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .info-val { font-size: 1.4rem; }
        }

        @media (max-width: 400px) {
            .bot-name { font-size: 1.8rem; }
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <!-- Header -->
    <div class="header">
        <div class="logo-wrap">
            <div class="logo">DX</div>
            <div>
                <h1 class="bot-name">DAVE-X</h1>
                <div class="bot-tag">WhatsApp Bot</div>
            </div>
        </div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
        <div class="status-icon"><i class="fas fa-check-circle"></i></div>
        <div class="status-text">BOT IS ONLINE</div>
        <div class="status-sub">Running and processing messages</div>

        <div class="info-grid">
            <div class="info-box">
                <div class="info-label"><i class="fas fa-clock"></i> Time</div>
                <div class="info-val" id="timeValue">--:--:--</div>
            </div>
            <div class="info-box">
                <div class="info-label"><i class="fas fa-calendar-alt"></i> Date</div>
                <div class="info-val" id="dateValue">---</div>
            </div>
            <div class="info-box">
                <div class="info-label"><i class="fas fa-calendar-day"></i> Day</div>
                <div class="info-val" id="dayValue">---</div>
            </div>
        </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-val" id="uptimeValue">00:00:00</div>
            <div class="stat-lbl">Uptime</div>
        </div>
        <div class="stat-box">
            <div class="stat-val">24/7</div>
            <div class="stat-lbl">Availability</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="pingValue">--ms</div>
            <div class="stat-lbl">Ping</div>
        </div>
    </div>

    <!-- Developer -->
    <div class="dev-section">
        <div class="dev-label">Developed with <i class="fas fa-heart" style="color:#f43f5e;"></i> by</div>
        <div class="dev-name"><i class="fas fa-code"></i> Dave Tech</div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>DAVE-X &copy; 2025 &mdash; All Rights Reserved</p>
        <p style="margin-top:6px;">Built by Dave Tech &bull; Supreme Edition</p>
        <div class="social-row">
            <a href="https://t.me/Digladoo" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://whatsapp.com/channel/0029VbApvFQ2Jl84lhONkc3k" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://t.me/DavexTech" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 60, density: { enable: true, value_area: 900 } },
                    color: { value: '#7c3aed' },
                    shape: { type: 'circle' },
                    opacity: { value: 0.45, random: true },
                    size: { value: 2.5, random: true },
                    line_linked: { enable: true, distance: 140, color: '#06b6d4', opacity: 0.18, width: 1 },
                    move: { enable: true, speed: 1.8, direction: 'none', random: true, out_mode: 'out', bounce: false }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' } }
                },
                retina_detect: true
            });

            const start = new Date();

            function tick() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');

                document.getElementById('timeValue').textContent =
                    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

                document.getElementById('dateValue').textContent =
                    now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

                document.getElementById('dayValue').textContent =
                    ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];

                const ms = now - start;
                const h = Math.floor(ms / 3600000);
                const m = Math.floor((ms % 3600000) / 60000);
                const s = Math.floor((ms % 60000) / 1000);
                document.getElementById('uptimeValue').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

                document.getElementById('pingValue').textContent = `${Math.floor(Math.random() * 55) + 18}ms`;
            }

            setInterval(tick, 1000);
            tick();
        });
    </script>
</body>
</html>
